services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smartcourse-postgres
    environment:
      POSTGRES_USER: smartcourse
      POSTGRES_PASSWORD: smartcourse_password
      POSTGRES_DB: smartcourse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcourse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smartcourse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smartcourse-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: smartcourse
      RABBITMQ_DEFAULT_PASS: smartcourse_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka and Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smartcourse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smartcourse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: smartcourse-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  # Temporal Server
  temporal:
    image: temporalio/auto-setup:1.21.0
    container_name: smartcourse-temporal
    depends_on:
      - postgres
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      DB: postgres
      DB_PORT: 5432
      POSTGRES_USER: smartcourse
      POSTGRES_PASSWORD: smartcourse_password
      POSTGRES_SEEDS: postgres
      POSTGRES_DATABASE: smartcourse
    volumes:
      - temporal_data:/var/lib/temporal

  # Temporal UI
  temporal-ui:
    image: temporalio/ui:1.21.0
    container_name: smartcourse-temporal-ui
    depends_on:
      - temporal
    ports:
      - "8088:8088"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.6.0
    container_name: smartcourse-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: smartcourse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: smartcourse-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

  # Jaeger Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: smartcourse-jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  zookeeper_data:
  kafka_data:
  temporal_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: smartcourse-network
